<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bonus Dimension — SpideyPK</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #111, #000);
      font-family: 'Montserrat', sans-serif;
      color: white;
      overflow: hidden;
      text-align: center;
    }
    h1 {
      margin-top: 20px;
      font-size: 40px;
      color: #00ff99;
    }
    #game-area {
      position: relative;
      width: 100%;
      height: calc(100vh - 100px);
      overflow: hidden;
      cursor: pointer;
    }
    .coin {
      position: absolute;
      width: 50px;
      height: 50px;
      background: gold;
      border-radius: 50%;
      box-shadow: 0 0 20px gold;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #score {
      font-size: 22px;
      margin-top: 8px;
      opacity: 0.8;
    }
    a.back {
      color: #00ff99;
      font-weight: 700;
      text-decoration: none;
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(255,255,255,0.1);
      padding: 10px 16px;
      border-radius: 10px;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>

  <a href="index.html" class="back">← Back</a>

  <h1>🕸️ Bonus Dimension</h1>
  <div id="score">Coins Collected: 0</div>

  <div id="game-area"></div>

  <script>
    const game = document.getElementById("game-area");
    const scoreText = document.getElementById("score");
    let score = 0;

    function spawnCoin() {
      const coin = document.createElement("div");
      coin.className = "coin";

      coin.style.left = Math.random() * (window.innerWidth - 80) + "px";
      coin.style.top = Math.random() * (window.innerHeight - 160) + "px";

      coin.onclick = () => {
        score++;
        scoreText.textContent = "Coins Collected: " + score;
        coin.remove();
      };

      game.appendChild(coin);

      setTimeout(() => coin.remove(), 3000);
    }

    setInterval(spawnCoin, 800);
  </script>

</body>
</html>
