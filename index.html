<!DOCTYPE html>
<html>
<head>
  <title>SpideyPK Webverse</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      color: lime;
      text-align: center;
      font-family: 'Comic Sans MS', sans-serif;

      background: url('https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExaDd1dnExYWUzNDN2dXZ3ejNxZGN4dmd3dWNpODI3cXJyb2hkeTFiYyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/BWD3CtcudWL28/giphy.gif')
        no-repeat center center fixed;
      background-size: cover;
      overflow-x: hidden;
    }

    nav a {
      color: lime;
      font-size: 24px;
      margin: 0 20px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: red;
      text-shadow: 0 0 10px lime, 0 0 20px red;
    }

    h1 {
      font-size: 60px;
      margin-top: 40px;
      animation: glow 2s infinite;
    }

    p {
      font-size: 24px;
      animation: glow 3s infinite alternate;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 10px lime; }
      50% { text-shadow: 0 0 25px red; }
      100% { text-shadow: 0 0 10px lime; }
    }

    #cursor-glow {
      position: fixed;
      pointer-events: none;
      width: 40px;
      height: 40px;
      background: rgba(0, 255, 0, 0.4);
      border-radius: 50%;
      box-shadow: 0 0 20px lime, 0 0 30px red;
      transform: translate(-50%, -50%);
      transition: 0.05s;
    }
  </style>
</head>

<body>
  <!-- glowing cursor -->
  <div id="cursor-glow"></div>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <h1>🕷️ Welcome to SpideyPK’s Webverse 🕸️</h1>
  <p>Where chaos, GIFs, and radioactive glow rule the universe.</p>

  <script>
    // move the glowing cursor
    const cursor = document.getElementById('cursor-glow');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
  </script>

</body>
</html>
