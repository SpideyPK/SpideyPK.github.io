<!DOCTYPE html>
<html>
<head>
  <title>Contact SpideyPK</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', sans-serif;
      text-align: center;
      color: pink;

      background: url('https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExaDd1dnExYWUzNDN2dXZ3ejNxZGN4dmd3dWNpODI3cXJyb2hkeTFiYyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/BWD3CtcudWL28/giphy.gif')
        no-repeat center center fixed;
      background-size: cover;
    }

    nav a {
      color: pink;
      font-size: 24px;
      margin: 0 20px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: white;
      text-shadow: 0 0 10px pink, 0 0 20px white;
    }

    h1 {
      font-size: 60px;
      margin-top: 40px;
      animation: glow 2s infinite;
    }

    p {
      font-size: 25px;
      animation: glow 3s infinite alternate;
    }

    @keyframes glow {
      0% { text-shadow: 0 0 10px pink; }
      50% { text-shadow: 0 0 25px white; }
      100% { text-shadow: 0 0 10px pink; }
    }

    #cursor-glow {
      position: fixed;
      pointer-events: none;
      width: 40px;
      height: 40px;
      background: rgba(255, 100, 255, 0.4);
      border-radius: 50%;
      box-shadow: 0 0 20px pink, 0 0 30px white;
      transform: translate(-50%, -50%);
      transition: 0.05s;
    }

    .box {
      margin-top: 40px;
      font-size: 22px;
      padding: 20px;
      border: 2px solid pink;
      border-radius: 10px;
      width: 60%;
      margin-left: auto;
      margin-right: auto;
      backdrop-filter: blur(4px);
    }
  </style>
</head>

<body>
  <div id="cursor-glow"></div>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

  <h1>Contact SpideyPK 🕸️</h1>

  <div class="box">
    <p><b>Email:</b> moayedalqobali@gmail.com</p>
    <p><b>Instagram:</b> @yourIG</p>
    <p><b>Discord:</b> Spidey#0000</p>
    <p><b>Carrier Pigeon:</b> throw a letter out your window and pray 🕊️😔</p>
  </div>

  <script>
    const cursor = document.getElementById('cursor-glow');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
  </script>

</body>
</html>
